<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#7EC8F5">
<title>なつやすみ大作戦</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#3B3355; --ink2:#6E6A8A; --line:#E7E3F3;
  --sun1:#7EC8F5; --sun2:#FFD84D; --sun3:#FF8A65;
  --rain1:#8FB8E8; --rain2:#A8E0E0; --rain3:#B39DDB;
  --c1:var(--sun1); --c2:var(--sun2); --c3:var(--sun3);
  --card:#FFFFFF; --ok:#4CD07D;
  --r:22px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:"M PLUS Rounded 1c","Hiragino Maru Gothic ProN","ヒラギノ丸ゴ ProN W4",system-ui,sans-serif;
  color:var(--ink); font-weight:700;
  background:linear-gradient(180deg,var(--c1) 0%, #FDF6E6 42%, #FDF6E6 100%);
  background-attachment:fixed;
  min-height:100vh; padding-bottom:96px;
}
body.rain{background:linear-gradient(180deg,var(--c1) 0%, #EFF3FA 42%, #EFF3FA 100%)}
.wrap{max-width:520px;margin:0 auto;padding:14px 14px 0}

/* ---- header ---- */
.hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.logo{font-size:22px;font-weight:800;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.12);letter-spacing:.02em}
.logo small{display:block;font-size:11px;opacity:.9;font-weight:700;letter-spacing:.3em}
.datebox{margin-left:auto;background:rgba(255,255,255,.9);border-radius:999px;padding:7px 12px;font-size:13px;display:flex;align-items:center;gap:6px;box-shadow:0 3px 0 rgba(0,0,0,.06)}
.datebox input{border:0;background:transparent;font:inherit;color:var(--ink);width:112px;font-size:13px}

/* ---- weather switch (signature) ---- */
.wsw{display:flex;background:rgba(255,255,255,.55);border-radius:999px;padding:5px;margin-bottom:12px;box-shadow:inset 0 2px 6px rgba(0,0,0,.08)}
.wsw button{flex:1;border:0;background:transparent;font:inherit;font-size:16px;font-weight:800;color:#fff;padding:12px 0;border-radius:999px;transition:.18s;display:flex;align-items:center;justify-content:center;gap:8px}
.wsw button .e{font-size:22px}
.wsw button.on{background:#fff;color:var(--ink);box-shadow:0 3px 0 rgba(0,0,0,.08)}

/* ---- today banner ---- */
.pat{background:var(--card);border-radius:var(--r);padding:14px 16px;box-shadow:0 6px 0 rgba(59,51,85,.08);margin-bottom:12px}
.pat .top{display:flex;align-items:center;gap:10px}
.badge{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;font-size:22px;font-weight:800;color:#fff;background:var(--c3);box-shadow:0 3px 0 rgba(0,0,0,.12)}
.pat h2{margin:0;font-size:17px}
.pat .sub{font-size:12px;color:var(--ink2);font-weight:700}
.memo{margin-top:10px;font-size:12px;line-height:1.6;background:#FFF8E1;border-radius:12px;padding:8px 10px;color:#7A6A2F}
body.rain .memo{background:#EAF1FB;color:#4A5C7A}

/* ---- tabs ---- */
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:40;background:#fff;border-top:2px solid var(--line);display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
.tabs button{flex:1;border:0;background:transparent;font:inherit;font-weight:800;font-size:10px;color:#B6B2C7;padding:6px 0;display:flex;flex-direction:column;align-items:center;gap:2px}
.tabs button .e{font-size:21px;filter:grayscale(1);opacity:.5}
.tabs button.on{color:var(--ink)}
.tabs button.on .e{filter:none;opacity:1;transform:translateY(-2px)}
.pill{position:absolute;top:2px;right:calc(50% - 26px);background:var(--sun3);color:#fff;font-size:9px;border-radius:99px;padding:1px 5px}

/* ---- timeline ---- */
.tl{position:relative;padding-left:8px}
.tl:before{content:"";position:absolute;left:29px;top:14px;bottom:14px;width:4px;border-radius:4px;background:repeating-linear-gradient(180deg,var(--c1) 0 8px,transparent 8px 14px)}
.ev{display:flex;gap:12px;margin-bottom:10px;position:relative}
.dot{width:44px;height:44px;flex:0 0 44px;border-radius:50%;background:#fff;border:3px solid var(--c1);display:grid;place-items:center;font-size:20px;z-index:1;box-shadow:0 3px 0 rgba(59,51,85,.08)}
.ev.go .dot{border-color:var(--c3);animation:pop 1.6s infinite}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.body{flex:1;background:var(--card);border-radius:18px;padding:11px 13px;box-shadow:0 4px 0 rgba(59,51,85,.07);display:flex;align-items:center;gap:10px}
.body .t{font-size:12px;color:var(--c3);letter-spacing:.04em}
.body .n{font-size:15px;line-height:1.35}
.body .note{font-size:11px;color:var(--ink2);margin-top:2px;line-height:1.4}
.chk{margin-left:auto;width:34px;height:34px;flex:0 0 34px;border-radius:12px;border:3px solid var(--line);background:#fff;display:grid;place-items:center;font-size:17px;color:transparent}
.ev.done .body{opacity:.45}
.ev.done .chk{background:var(--ok);border-color:var(--ok);color:#fff}
.ev.now .body{outline:3px solid var(--c2);outline-offset:2px}
.ev.now:after{content:"いま";position:absolute;top:-8px;left:52px;background:var(--c2);color:#fff;font-size:10px;padding:2px 8px;border-radius:99px}
.ev.go .body .n{color:#E2544B}

/* ---- missions ---- */
.card{background:var(--card);border-radius:var(--r);padding:14px;box-shadow:0 6px 0 rgba(59,51,85,.08);margin-bottom:12px}
.card h3{margin:0 0 10px;font-size:15px;display:flex;align-items:center;gap:8px}
.ms{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:#FAF8FF;margin-bottom:8px}
.ms .e{font-size:22px}
.ms .n{font-size:14px}
.ms .pt{margin-left:auto;font-size:11px;color:var(--ink2);margin-right:8px}
.ms.done{opacity:.45}
.ms.done .n{text-decoration:line-through}
.who{display:flex;gap:8px;margin-bottom:12px}
.who button{flex:1;border:0;font:inherit;font-weight:800;font-size:14px;padding:12px;border-radius:16px;background:rgba(255,255,255,.6);color:var(--ink2);box-shadow:0 3px 0 rgba(59,51,85,.07)}
.who button.on{background:#fff;color:var(--ink);box-shadow:0 3px 0 var(--c3)}
.who input{border:0;background:transparent;font:inherit;text-align:center;width:100%}

/* ---- points / stickers ---- */
.score{display:flex;gap:10px;margin-bottom:12px}
.sc{flex:1;background:var(--card);border-radius:18px;padding:12px;text-align:center;box-shadow:0 5px 0 rgba(59,51,85,.08)}
.sc .v{font-size:26px;font-weight:800;color:var(--c3)}
.sc .l{font-size:11px;color:var(--ink2)}
.sheet{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.sl{aspect-ratio:1;border-radius:14px;background:#F6F3FF;display:grid;place-items:center;font-size:24px;border:2px dashed #DCD5F0}
.sl.f{background:#fff;border:2px solid var(--c2);box-shadow:0 3px 0 rgba(59,51,85,.08);animation:in .4s}
@keyframes in{from{transform:scale(.4) rotate(-20deg);opacity:0}}
.shop{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;background:#FFF8E1;margin-bottom:8px}
body.rain .shop{background:#EAF1FB}
.shop .e{font-size:22px}
.shop button{margin-left:auto;border:0;font:inherit;font-weight:800;font-size:12px;color:#fff;background:var(--c3);padding:9px 14px;border-radius:12px;box-shadow:0 3px 0 rgba(0,0,0,.12)}
.shop button:disabled{background:#D6D2E4;box-shadow:0 3px 0 rgba(0,0,0,.06)}

/* ---- calendar ---- */
.cal{background:var(--card);border-radius:var(--r);padding:12px;box-shadow:0 6px 0 rgba(59,51,85,.08);margin-bottom:12px}
.cal h3{margin:0 0 8px;font-size:15px}
.g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.g .h{text-align:center;font-size:10px;color:var(--ink2);padding:2px 0}
.d{aspect-ratio:.82;border-radius:10px;background:#FAF8FF;padding:3px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-size:10px;border:2px solid transparent}
.d .num{font-size:12px}
.d .p{margin-top:2px;width:19px;height:19px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:10px;font-weight:800}
.d.sel{border-color:var(--c3)}
.d.empty{background:transparent}
.pA{background:#FF8A65}.pB{background:#7E9CF5}.pC{background:#4CD07D}.pD{background:#F5A0C8}.pE{background:#FFB74D}.pEC{background:#FF9E80}.pG{background:#7E57C2}.pS{background:#5BC8E0}.pH{background:#C8C4D8}
.p{font-size:9px!important}
.lg{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;font-size:10px;color:var(--ink2)}
.lg span{display:flex;align-items:center;gap:4px}
.lg i{width:12px;height:12px;border-radius:4px;display:block}

/* ---- alarm overlay ---- */
#al{position:fixed;inset:0;z-index:99;background:rgba(59,51,85,.75);display:none;place-items:center;padding:20px}
#al.on{display:grid}
#al .b{background:#fff;border-radius:26px;padding:26px 20px;text-align:center;max-width:340px;width:100%;animation:sh .5s}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
#al .e{font-size:64px}
#al h2{margin:8px 0 4px;font-size:22px}
#al p{margin:0 0 18px;font-size:14px;color:var(--ink2)}
#al button{border:0;font:inherit;font-weight:800;font-size:16px;color:#fff;background:var(--c3);padding:14px 30px;border-radius:16px;box-shadow:0 4px 0 rgba(0,0,0,.15)}
.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%);background:var(--ok);color:#fff;padding:10px 18px;border-radius:99px;font-size:14px;z-index:98;box-shadow:0 4px 0 rgba(0,0,0,.12);animation:tin .3s}
@keyframes tin{from{transform:translate(-50%,-30px);opacity:0}}
.bell{width:100%;border:0;font:inherit;font-weight:800;font-size:13px;padding:12px;border-radius:16px;background:#fff;color:var(--ink);box-shadow:0 4px 0 rgba(59,51,85,.08);margin-bottom:12px}
.hide{display:none}
.auto{font-size:11px;color:#fff;text-align:center;margin:-6px 0 12px;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.15)}
.reset{width:100%;border:0;font:inherit;font-weight:800;font-size:12px;padding:11px;border-radius:14px;background:rgba(255,255,255,.7);color:var(--ink2);box-shadow:0 3px 0 rgba(59,51,85,.06);margin:2px 0 14px}
.reset:active{transform:translateY(2px)}
</style>
</head>

function buildTL(p,w,dow){
  let list=(T[p+"_"+w]||T.H_sun).map(a=>a.slice());
  if(dow==="土"&&(p==="C"||p==="D")){
    list=list.map(e=>{
      if(SAT[e[0]]){e[0]=SAT[e[0]];
        if(e[2].indexOf("そろばん（")===0)e[2]="そろばん（16:30〜18:00）";
        if(e[3])e[3]+="（土曜の時間だよ）"; else if(e[4])e[3]="土曜は はやめ！";
      } return e;});
    list.sort((a,b)=>a[0]<b[0]?-1:1);
  }
  return list;
}

function tone(f,t,d,type){AC=AC||new (window.AudioContext||window.webkitAudioContext)();const o=AC.createOscillator(),g=AC.createGain();o.type=type||"triangle";o.frequency.value=f;o.connect(g);g.connect(AC.destination);g.gain.setValueAtTime(.0001,AC.currentTime+t);g.gain.exponentialRampToValueAtTime(.25,AC.currentTime+t+.01);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+t+d);o.start(AC.currentTime+t);o.stop(AC.currentTime+t+d+.02);}

function dstate(){const k=key(CUR);S.done[k]=S.done[k]||[[],[]];return S.done[k];}

function toggle(t,id,pt){
  const arr=dstate()[S.kid],k=t+id,i=arr.indexOf(k),kid=S.kids[S.kid];
  if(i>=0){arr.splice(i,1);kid.pt=Math.max(0,kid.pt-pt);}
  else{
    arr.push(k);kid.pt+=pt;sPoint();
    const need=Math.floor(kid.pt/20);
    if(kid.stk.length<need){while(kid.stk.length<need)kid.stk.push(STK[Math.floor(Math.random()*STK.length)]);
      sLevel();toast("シールを1まい ゲット！ 🎉");}
    else toast("+"+pt+"pt！ よくできました 💮");
  }
  save();render();
}
function ptOf(k){
  if(k[0]==="m"){const m=MISSIONS.find(x=>x[0]===k.slice(1));return m?m[3]:0;}
  return 5;
}
function resetDay(all){
  const k=key(CUR),d=dstate();
  const targets=all?[0,1]:[S.kid];
  const names=targets.map(i=>S.kids[i].name).join("と");
  if(!confirm(`${(+k.slice(0,2))}月${(+k.slice(3))}日 の ${names} のチェックとポイントを ぜんぶ 0に もどします。いいですか？`))return;
  targets.forEach(i=>{
    const kid=S.kids[i];
    const sum=d[i].reduce((a,x)=>a+ptOf(x),0);
    kid.pt=Math.max(0,kid.pt-sum);
    kid.used=Math.min(kid.used,kid.pt);
    const need=Math.floor(kid.pt/20);
    if(kid.stk.length>need)kid.stk.length=need;
    d[i]=[];
  });
  S.done[k]=d;
  tone(392,0,.18);tone(294,.12,.25);
  save();render();toast("きょうの分を リセットしました 🔄");
}

function cal(y,m){
  const first=new Date(y,m-1,1).getDay(),last=new Date(y,m,0).getDate();
  let h=`<div class="cal"><h3>🗓️ ${m}月</h3><div class="g">`+
    ["日","月","火","水","木","金","土"].map(d=>`<div class="h">${d}</div>`).join("");
  for(let i=0;i<first;i++)h+='<div class="d empty"></div>';
  for(let d=1;d<=last;d++){
    const k=String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0"),c=CAL[k];
    const iso=`${y}-${k}`;
    h+=`<div class="d ${CUR===iso?"sel":""}" ${c?`data-day="${iso}"`:""} style="${c?"":"opacity:.35"}">
      <div class="num">${d}</div>${c?`<div class="p p${c[0]}">${badgeTx(c[0])}</div>`:""}
      ${c&&(c[2].indexOf("お盆")>=0||c[2].indexOf("海の日")>=0||c[2].indexOf("山の日")>=0)?'<div style="font-size:9px">🎌</div>':""}
      ${c&&(c[2].indexOf("終業式")>=0||c[2].indexOf("始業式")>=0)?'<div style="font-size:9px">🎒</div>':""}
      ${c&&c[2].indexOf("眼科")>=0?'<div style="font-size:9px">👁️</div>':""}</div>`;
  }
  return h+"</div></div>";
}

let fired={},notifOK=false;
function checkAlarm(){
  if(!isToday())return;
  const k=key(CUR),c=CAL[k];if(!c)return;
  const tl=buildTL(c[0],S.w,c[1]),n=nowMin();
  tl.forEach(e=>{
    if(!e[4])return;const t=hm(e[0]);
    [[t-10,"あと10ぷんで しゅっぱつ！"],[t,"いま しゅっぱつ！ いってらっしゃい！"]].forEach(([mm,msg])=>{
      const id=k+e[0]+mm;
      if(n===mm&&!fired[id]){fired[id]=1;popAlarm(e[1],msg,e[2]+(e[3]?" / "+e[3]:""));}
    });
  });
}
function popAlarm(emo,title,sub){
  $("#alE").textContent=emo;$("#alT").textContent=title;$("#alP").textContent=sub;
  $("#al").classList.add("on");sAlarm();
  const iv=setInterval(sAlarm,2400);$("#al").dataset.iv=iv;
  if(notifOK)try{new Notification("なつやすみ大作戦",{body:title+"\n"+sub});}catch(e){}
  if(navigator.vibrate)navigator.vibrate([200,100,200,100,400]);
}
$("#alBtn").onclick=()=>{clearInterval($("#al").dataset.iv);$("#al").classList.remove("on");};
$("#bell").onclick=async()=>{
  try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();await AC.resume();}catch(e){}
  tone(880,0,.15);
  if("Notification" in window){const p=await Notification.requestPermission();notifOK=(p==="granted");}
  $("#bell").textContent=notifOK?"🔔 アラーム オン！（アプリを ひらいたままにしてね）":"🔔 音アラーム オン！（画面を ひらいたままにしてね）";
  $("#bell").style.background="#4CD07D";$("#bell").style.color="#fff";
};

/* ================= 操作 ================= */
document.addEventListener("click",e=>{
  const tap=e.target.closest("[data-tap]");
  if(tap){const[t,id,pt]=tap.dataset.tap.split("|");toggle(t,id,+pt);return;}
  const kd=e.target.closest("[data-kid]");
  if(kd){S.kid=+kd.dataset.kid;save();render();return;}
  const buy=e.target.closest("[data-buy]");
  if(buy){const s=SHOP[+buy.dataset.buy],kid=S.kids[S.kid];
    if(kid.pt-kid.used>=s[2]&&confirm(s[1]+" と こうかんする？（"+s[2]+"pt）")){kid.used+=s[2];sLevel();toast(s[0]+" こうかんしたよ！");save();render();}return;}
  const rs=e.target.closest("[data-reset]");
  if(rs){resetDay(rs.dataset.reset==="1");return;}
  const day=e.target.closest("[data-day]");
  if(day){CUR=day.dataset.day;$("#dt").value=CUR;switchView("Today");render();return;}
});
document.addEventListener("change",e=>{
  if(e.target.dataset.name!==undefined){S.kids[+e.target.dataset.name].name=e.target.value||"なまえ";save();}
});
document.querySelectorAll(".tabs button").forEach(b=>b.onclick=()=>switchView(b.dataset.v));
function switchView(v){
  document.querySelectorAll(".tabs button").forEach(b=>b.className=b.dataset.v===v?"on":"");
  ["Today","Mission","Sticker","Cal"].forEach(x=>$("#v"+x).className=x===v?"":"hide");
  window.scrollTo({top:0});if(v==="Today")render();
}
function setW(w,manual){S.w=w;if(manual){S.manual=true;S.autoDay=key(CUR);}save();render();}
$("#bSun").onclick=()=>setW("sun",true);
$("#bRain").onclick=()=>setW("rain",true);
$("#dt").onchange=()=>{if(CAL[key($("#dt").value)]){CUR=$("#dt").value;save();autoWeather();render();}};

/* ================= 天気じどう判定（Open-Meteo・APIキーふよう） ================= */
const HOME={lat:34.7217,lon:135.3617,name:"甲子園あたり"}; // 位置情報がとれないときのばしょ
function getPos(){
  return new Promise(res=>{
    if(!navigator.geolocation)return res(null);
    navigator.geolocation.getCurrentPosition(
      p=>res({lat:p.coords.latitude,lon:p.coords.longitude,name:"いまいるばしょ"}),
      ()=>res(null),{timeout:6000,maximumAge:1800000});
  });
}
async function autoWeather(){
  const box=$("#auto"),d=CUR;
  // 手動でえらんだ日は じょうしょがき しない
  if(S.manual&&S.autoDay===key(d)){box.textContent="✋ 天気は 手動でえらんだままです（ボタンで かえられるよ）";return;}
  box.textContent="🛰️ きょうの天気を しらべています…";
  const pos=(await getPos())||HOME;
  try{
    const u=`https://api.open-meteo.com/v1/forecast?latitude=${pos.lat}&longitude=${pos.lon}`
      +`&daily=precipitation_probability_max,weathercode&timezone=Asia%2FTokyo&start_date=${d}&end_date=${d}`;
    const r=await fetch(u);
    const j=await r.json();
    const pop=j.daily.precipitation_probability_max[0];
    const w=(pop>=50)?"rain":"sun";
    S.w=w;S.manual=false;S.autoDay=key(d);save();render();
    box.textContent=`🛰️ ${pos.name}・雨のかくりつ ${pop}% ➡ ${w==="rain"?"☔️ あめモード":"☀️ はれモード"}（ボタンで かえられるよ）`;
  }catch(e){
    box.textContent="🛰️ 天気が とれませんでした。ボタンで えらんでね";
  }
}

/* ================= 起動 ================= */
(async()=>{
  const s=await DB.get("natsu2026");if(s)S=Object.assign(S,s);
  if(!S.kids[0].name||S.kids[0].name==="ふたご①")S.kids[0].name="秋";
  if(!S.kids[1].name||S.kids[1].name==="ふたご②")S.kids[1].name="晴";
  const t=new Date().toISOString().slice(0,10);
  CUR=CAL[key(t)]?t:"2026-07-16";
  $("#dt").value=CUR;
  render();
  autoWeather();
  setInterval(()=>{checkAlarm();if(isToday())render();},30000);
})();
</script>
